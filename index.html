<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kasumi Excavation</title>
  </head>
  <body>
    <div id="app">
      <div id="lobby-screen" class="screen">
        <div class="lobby-panel">
          <div class="lobby-title">Kasumi Excavation</div>
          <div class="lobby-subtitle">7열 굴착 퍼즐</div>
          <div class="lobby-buttons">
            <button id="btn-single" class="lobby-btn primary">싱글플레이</button>
            <button id="btn-multi" class="lobby-btn">멀티플레이</button>
            <button id="btn-settings" class="lobby-btn">환경설정</button>
          </div>
        </div>
      </div>

      <div id="game-screen" class="screen" hidden>
        <div class="game-layout">
          <canvas id="game-canvas" width="392" height="840"></canvas>

          <aside class="side-panel">
            <div class="panel-top">
              <div class="info-box">
                <div>Depth: <strong id="depth-value">0</strong></div>
                <div>Best: <strong id="best-value">0</strong></div>
                <div>Chain: <strong id="chain-value">0</strong></div>
              </div>

              <div class="hearts" id="hp-hearts" aria-label="HP">
                <span class="heart filled" data-i="1">♥</span>
                <span class="heart filled" data-i="2">♥</span>
                <span class="heart filled" data-i="3">♥</span>
              </div>
            </div>

            <div class="panel-meters">
              <div class="meter">
                <div class="meter-label">Fuel</div>
                <div class="meter-track fuel-track">
                  <div class="meter-fill fuel" id="fuel-fill"></div>
                </div>
              </div>

              <div class="meter">
                <div class="meter-label">Combo</div>
                <div class="meter-track combo-track">
                  <div class="meter-fill combo" id="combo-fill"></div>
                </div>
              </div>
            </div>

            <button id="btn-back-lobby" type="button" class="secondary-btn">로비로 돌아가기</button>
            <button id="restart-btn" type="button" hidden>Restart (R)</button>
          </aside>
        </div>
      </div>

      <div id="settings-overlay" class="overlay" hidden>
        <div class="overlay-backdrop" id="settings-backdrop"></div>
        <div class="overlay-panel" role="dialog" aria-modal="true">
          <div class="overlay-header">
            <div class="overlay-title">환경설정</div>
            <button id="settings-close" class="icon-btn" aria-label="Close">✕</button>
          </div>

          <div class="overlay-content">
            <div class="setting-row">
              <label for="opt-bgm">BGM</label>
              <input id="opt-bgm" type="range" min="0" max="100" step="1" value="70" />
            </div>
            <div class="setting-row">
              <label for="opt-sfx">효과음</label>
              <input id="opt-sfx" type="range" min="0" max="100" step="1" value="75" />
            </div>
            <div class="setting-row">
              <label for="opt-voice">보이스</label>
              <input id="opt-voice" type="range" min="0" max="100" step="1" value="65" />
            </div>
            <div class="setting-row">
              <label>진동</label>
              <div class="radio-group">
                <label><input id="opt-vibration-on" type="radio" name="opt-vibration" value="on" checked /> ON</label>
                <label><input id="opt-vibration-off" type="radio" name="opt-vibration" value="off" /> OFF</label>
              </div>
            </div>
            <div class="settings-note">※ 일부 옵션은 Stub입니다.</div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
