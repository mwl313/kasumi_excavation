<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kasumi Excavation</title>
  </head>
  <body>
    <div id="app">
      <div class="game-layout">
        <canvas id="game-canvas" width="392" height="840"></canvas>

        <aside class="side-panel">
          <div class="panel-top">
            <div class="info-box">
              <div>Depth: <strong id="depth-value">0</strong></div>
              <div>Best: <strong id="best-value">0</strong></div>
              <div>Chain: <strong id="chain-value">0</strong></div>
            </div>

            <div class="hearts" id="hp-hearts" aria-label="HP">
              <span class="heart filled" data-i="1">♥</span>
              <span class="heart filled" data-i="2">♥</span>
              <span class="heart filled" data-i="3">♥</span>
            </div>
          </div>

          <div class="panel-meters">
            <div class="meter">
              <div class="meter-label">Fuel</div>
              <div class="meter-track fuel-track">
                <div class="meter-fill fuel" id="fuel-fill"></div>
              </div>
            </div>

            <div class="meter">
              <div class="meter-label">Combo</div>
              <div class="meter-track combo-track">
                <div class="meter-fill combo" id="combo-fill"></div>
              </div>
            </div>
          </div>

          <button id="restart-btn" type="button" hidden>Restart (R)</button>
        </aside>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
